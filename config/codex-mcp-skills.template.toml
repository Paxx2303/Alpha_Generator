# Copy the blocks you want into C:\Users\Admin\.codex\config.toml after setting real API keys.
# These integrations come from the skill article the user referenced.

[mcp_servers.morph-mcp]
command = "npx"
args = ["-y", "@morphllm/morphmcp"]

[mcp_servers.morph-mcp.env]
MORPH_API_KEY = "replace-with-real-key"

[mcp_servers.valyu]
command = "npx"
args = ["-y", "@valyu/mcp-server"]

[mcp_servers.valyu.env]
VALYU_API_KEY = "replace-with-real-key"

# Notes:
# - WarpGrep in the article maps to the Morph MCP server above.
# - Valyu is a separate MCP integration for live web/paper/GitHub research.
# - Superpowers is a plugin install flow, not a local skill folder.
# - Codex Security is a Codex Cloud feature, not a local skill.
