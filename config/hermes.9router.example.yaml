model:
  provider: custom
  default: ${HERMES_MODEL_NAME}
  base_url: ${NINE_ROUTER_BASE_URL}
  api_key: ${NINE_ROUTER_API_KEY}
  api_mode: chat_completions
  context_length: 65536

terminal:
  backend: local
  timeout: 180
  env_passthrough:
    - WQ_USERNAME
    - WQ_PASSWORD
    - NINE_ROUTER_BASE_URL
    - NINE_ROUTER_API_KEY

auxiliary:
  web_summarization:
    provider: main
  image_analysis:
    provider: main
  title_generation:
    provider: main

