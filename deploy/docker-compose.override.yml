# Add Streamlit observation dashboard to DeerFlow's docker-compose.
# Paths are relative to THIS file's directory: /app/alpha-generator/deploy/

services:
  observation:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.observation
    ports:
      - "8080:8080"
    volumes:
      - ../data:/app/data:ro
    environment:
      - PYTHONPATH=/app
      - STREAMLIT_SERVER_BASE_URL_PATH=/observe
    restart: unless-stopped

  # Override DeerFlow's nginx to add /observe/ route
  nginx:
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
