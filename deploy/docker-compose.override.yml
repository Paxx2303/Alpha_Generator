# Override DeerFlow's docker/docker-compose.yaml.
# Used with: docker compose -f docker/docker-compose.yaml -f /app/alpha-generator/deploy/docker-compose.override.yml
#
# Adds host.docker.internal so backend containers can reach Ollama on the host (port 11434).
# Observation dashboard runs on Cloud Run — no VM container needed.

services:
  gateway:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount custom skills so DeerFlow can load them at runtime
      - /app/deer-flow/skills/custom:/app/skills/custom:ro
      - /app/deer-flow/skills/custom:/skills/custom:ro

  frontend:
    environment:
      # Fix: Next.js SSR must reach gateway via Docker DNS, not localhost
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
      # Allow browser requests from the VM's external IP
      - DEER_FLOW_TRUSTED_ORIGINS=http://34.81.142.38:2026,http://34.81.142.38

  provisioner:
    entrypoint: ["sh", "-c", "echo 'Provisioner disabled (LocalSandbox mode)' && exit 0"]
    restart: "no"
