# Override DeerFlow's docker/docker-compose.yaml.
# Used with: docker compose -f docker/docker-compose.yaml -f /app/alpha-generator/deploy/docker-compose.override.yml
#
# Adds host.docker.internal so backend containers can reach Ollama on the host (port 11434).
# Observation dashboard runs as a container on this VM (not Cloud Run) so it can read
# alpha_store.db, research_status.json, and theory_log.json directly via volume mount.

services:
  gateway:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Expose gateway to host so research_daemon.py can call it directly
      # (bypasses nginx + auth; only accessible from VM localhost)
      - "127.0.0.1:8001:8001"
    environment:
      - ENABLE_CUSTOM_AGENT_MANAGEMENT=true
      # Pass internal token so CSRF middleware can validate X-Internal-Token header
      - DEER_FLOW_INTERNAL_AUTH_TOKEN=${DEER_FLOW_INTERNAL_AUTH_TOKEN}
    volumes:
      # Mount custom skills so DeerFlow can load them at runtime
      - /app/deer-flow/skills/custom:/app/skills/custom:ro
      - /app/deer-flow/skills/custom:/skills/custom:ro

  frontend:
    environment:
      # Fix: Next.js SSR must reach gateway via Docker DNS, not localhost
      - DEER_FLOW_INTERNAL_GATEWAY_BASE_URL=http://gateway:8001
      # Allow browser requests from the VM's external IP
      - DEER_FLOW_TRUSTED_ORIGINS=http://34.81.142.38:2026,http://34.81.142.38
      - NEXT_PUBLIC_ENABLE_CUSTOM_AGENT_MANAGEMENT=true

  provisioner:
    entrypoint: ["sh", "-c", "echo 'Provisioner disabled (LocalSandbox mode)' && exit 0"]
    restart: "no"

  # Observation dashboard — co-located with the agent so it can read local data files.
  streamlit:
    build:
      context: /app/alpha-generator
      dockerfile: deploy/Dockerfile.observation
    ports:
      - "8080:8080"
    volumes:
      # Read-only mount: gives the dashboard access to live SQLite + JSON state files
      - /app/alpha-generator/data:/app/data:ro
      - /app/alpha-generator/RESEARCH_LOG.md:/app/RESEARCH_LOG.md:ro
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
