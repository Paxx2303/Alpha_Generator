apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: alpha-glm
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/accelerator: nvidia-l4
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      timeoutSeconds: 600
      containerConcurrency: 4
      containers:
        - image: gcr.io/PROJECT_ID/alpha-glm:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
              cpu: "8"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: latest
            - name: MODEL_ID
              value: zai-org/GLM-5.2
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 10
