name: Deploy to GCP

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Job 1: Deploy Streamlit dashboard to Cloud Run ───────────────────────
  deploy-observation:
    name: Deploy Observation Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to GCR
        run: |
          gcloud auth print-access-token \
            | docker login -u oauth2accesstoken --password-stdin gcr.io

      - name: Build and push observation image
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/alpha-observation
          docker build \
            -f deploy/Dockerfile.observation \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy alpha-observation \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/alpha-observation:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --allow-unauthenticated \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print dashboard URL
        run: |
          URL=$(gcloud run services describe alpha-observation \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Dashboard live at: $URL"

  # ─── Job 2: Deploy DeerFlow on GCE VM ─────────────────────────────────────
  # Runs on every push to main.
  # First push: installs Docker, clones repos, runs DeerFlow make setup, starts compose.
  # Subsequent pushes: git pull, syncs configs, restarts observation container.
  #
  # Required GitHub Secrets: WQB_EMAIL, WQB_PASSWORD
  # Optional GitHub Secrets: GCS_BACKUP_BUCKET
  deploy-vm:
    name: Deploy DeerFlow on VM
    runs-on: ubuntu-latest
    needs: deploy-observation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env to VM
        run: |
          ENV_B64=$(printf '%s\n' \
            "WQB_EMAIL=${{ secrets.WQB_EMAIL }}" \
            "WQB_PASSWORD=${{ secrets.WQB_PASSWORD }}" \
            "OLLAMA_HOST=http://localhost:11434" \
            "DEERFLOW_URL=http://localhost:8000" \
            "GCS_BACKUP_BUCKET=${{ secrets.GCS_BACKUP_BUCKET }}" \
            | base64 -w0)
          gcloud compute ssh instance-20260620-094221 \
            --zone asia-east1-b \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command="sudo mkdir -p /app/deer-flow && sudo chown \$USER:\$USER /app /app/deer-flow && echo '${ENV_B64}' | base64 -d > /app/deer-flow/.env"

      - name: Bootstrap or update VM
        run: |
          gcloud compute ssh instance-20260620-094221 \
            --zone asia-east1-b \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command='
              set -e
              if ! command -v docker &>/dev/null; then
                echo "=== First run: full bootstrap ==="
                sudo apt-get update -qq && sudo apt-get install -y git
                sudo mkdir -p /app && sudo chown $USER:$USER /app
                git clone https://github.com/Paxx2303/Alpha_Generator.git /app/alpha-generator
                chmod +x /app/alpha-generator/deploy/vm-setup.sh
                bash /app/alpha-generator/deploy/vm-setup.sh
              else
                echo "=== Update run ==="
                cd /app/alpha-generator && git pull
                cp operation/deerflow/config.yaml /app/deer-flow/config.yaml
                cp operation/deerflow/extensions_config.json /app/deer-flow/extensions_config.json
                mkdir -p /app/deer-flow/skills/alpha-research
                cp operation/deerflow/skills/alpha-research/SKILL.md \
                   /app/deer-flow/skills/alpha-research/SKILL.md
                cd /app/deer-flow
                docker compose -f docker-compose.yml \
                  -f ../alpha-generator/deploy/docker-compose.override.yml \
                  up -d --build observation
                echo "Update complete"
              fi
            '

      - name: Print VM URLs
        run: |
          VM_IP=$(gcloud compute instances describe instance-20260620-094221 \
            --zone asia-east1-b \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "DeerFlow UI:  http://${VM_IP}/"
          echo "Dashboard:    http://${VM_IP}/observe/"
