name: Deploy to GCP

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Job 1: Deploy Streamlit dashboard to Cloud Run ───────────────────────
  deploy-observation:
    name: Deploy Observation Dashboard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to GCR
        run: |
          gcloud auth print-access-token \
            | docker login -u oauth2accesstoken --password-stdin gcr.io

      - name: Build and push observation image
        run: |
          IMAGE=gcr.io/${{ secrets.GCP_PROJECT_ID }}/alpha-observation
          docker build \
            -f deploy/Dockerfile.observation \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy alpha-observation \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/alpha-observation:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --port 8080 \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --allow-unauthenticated \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Print dashboard URL
        run: |
          URL=$(gcloud run services describe alpha-observation \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Dashboard live at: $URL"

  # ─── Job 2: Deploy DeerFlow on GCE VM ─────────────────────────────────────
  # Runs on every push to main.
  # First push: installs Docker, clones repos, runs DeerFlow make setup, starts compose.
  # Subsequent pushes: git pull, syncs configs, restarts observation container.
  #
  # Required GitHub Secrets: WQB_EMAIL, WQB_PASSWORD
  # Optional GitHub Secrets: GCS_BACKUP_BUCKET
  deploy-vm:
    name: Deploy DeerFlow on VM
    runs-on: ubuntu-latest
    needs: deploy-observation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env to VM
        run: |
          AUTH_TOKEN=$(openssl rand -hex 32)
          AUTH_SECRET=$(openssl rand -hex 32)
          ENV_B64=$(printf '%s\n' \
            "WQB_EMAIL=${{ secrets.WQB_EMAIL }}" \
            "WQB_PASSWORD=${{ secrets.WQB_PASSWORD }}" \
            "OLLAMA_HOST=http://localhost:11434" \
            "DEERFLOW_URL=http://localhost:8000" \
            "GCS_BACKUP_BUCKET=${{ secrets.GCS_BACKUP_BUCKET }}" \
            "DEER_FLOW_HOME=/app/deer-flow" \
            "DEER_FLOW_REPO_ROOT=/app/deer-flow" \
            "DEER_FLOW_CONFIG_PATH=/app/deer-flow/config.yaml" \
            "DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/deer-flow/extensions_config.json" \
            "DEER_FLOW_INTERNAL_AUTH_TOKEN=${AUTH_TOKEN}" \
            "BETTER_AUTH_SECRET=${AUTH_SECRET}" \
            | base64 -w0)
          gcloud compute ssh alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command="echo '${ENV_B64}' | base64 -d > /tmp/alpha-deerflow.env"

      - name: Bootstrap or update VM
        run: |
          gcloud compute ssh alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command='
              set -e
              # Ensure git available
              command -v git &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y git)
              # Clone or update alpha-generator
              if [ ! -d /app/alpha-generator ]; then
                sudo mkdir -p /app && sudo chown $USER:$USER /app
                git clone https://github.com/Paxx2303/Alpha_Generator.git /app/alpha-generator
              else
                cd /app/alpha-generator && git fetch origin && git reset --hard origin/main
              fi
              # vm-setup.sh is idempotent — handles Docker install, deer-flow clone, Ollama, compose
              chmod +x /app/alpha-generator/deploy/vm-setup.sh
              bash /app/alpha-generator/deploy/vm-setup.sh
            '

      - name: Print VM URLs
        run: |
          VM_IP=$(gcloud compute instances describe alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "DeerFlow UI:  http://${VM_IP}/"
          echo "Dashboard:    http://${VM_IP}/observe/"
