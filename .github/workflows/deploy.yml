name: Deploy to GCP

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Deploy DeerFlow + Streamlit on GCE VM ────────────────────────────────
  # Streamlit runs as a Docker container on the VM (not Cloud Run) so it can
  # read alpha_store.db and JSON state files directly via volume mount.
  #
  # Required GitHub Secrets: WQB_EMAIL, WQB_PASSWORD, OPENROUTER_KEY
  # Optional GitHub Secrets: GCS_BACKUP_BUCKET, DEERFLOW_AUTH_TOKEN, DEERFLOW_AUTH_SECRET
  deploy-vm:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write .env to VM
        run: |
          # Use stable secrets so browser sessions survive redeployment.
          # If DEERFLOW_AUTH_TOKEN / DEERFLOW_AUTH_SECRET not set as GitHub secrets,
          # fall back to a random value (first deploy only).
          AUTH_TOKEN="${{ secrets.DEERFLOW_AUTH_TOKEN }}"
          AUTH_SECRET="${{ secrets.DEERFLOW_AUTH_SECRET }}"
          [ -z "$AUTH_TOKEN" ] && AUTH_TOKEN=$(openssl rand -hex 32)
          [ -z "$AUTH_SECRET" ] && AUTH_SECRET=$(openssl rand -hex 32)
          # Resolve the VM's current external IP at deploy time — never hardcode it.
          # With a reserved static IP this is stable; without one it still self-heals
          # after a stop/start. See docs/adr/0002-vm-external-ip-not-hardcoded.md.
          VM_IP=$(gcloud compute instances describe alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "VM external IP: ${VM_IP}"
          ENV_B64=$(printf '%s\n' \
            "WQB_EMAIL=${{ secrets.WQB_EMAIL }}" \
            "WQB_PASSWORD=${{ secrets.WQB_PASSWORD }}" \
            "OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }}" \
            "OLLAMA_HOST=http://localhost:11434" \
            "DEERFLOW_URL=http://localhost:8000" \
            "GCS_BACKUP_BUCKET=${{ secrets.GCS_BACKUP_BUCKET }}" \
            "DEER_FLOW_HOME=/app/deer-flow" \
            "DEER_FLOW_REPO_ROOT=/app/deer-flow" \
            "DEER_FLOW_CONFIG_PATH=/app/deer-flow/config.yaml" \
            "DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/deer-flow/extensions_config.json" \
            "DEER_FLOW_INTERNAL_AUTH_TOKEN=${AUTH_TOKEN}" \
            "BETTER_AUTH_SECRET=${AUTH_SECRET}" \
            "BETTER_AUTH_URL=http://${VM_IP}" \
            "VM_EXTERNAL_IP=${VM_IP}" \
            "ENABLE_CUSTOM_AGENT_MANAGEMENT=true" \
            "NEXT_PUBLIC_ENABLE_CUSTOM_AGENT_MANAGEMENT=true" \
            | base64 -w0)
          gcloud compute ssh alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command="echo '${ENV_B64}' | base64 -d > /tmp/alpha-deerflow.env"

      - name: Bootstrap or update VM
        run: |
          gcloud compute ssh alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command='
              set -e
              # Ensure git available
              command -v git &>/dev/null || (sudo apt-get update -qq && sudo apt-get install -y git)
              # Clone or update alpha-generator
              if [ ! -d /app/alpha-generator ]; then
                sudo mkdir -p /app && sudo chown $USER:$USER /app
                git clone https://github.com/Paxx2303/Alpha_Generator.git /app/alpha-generator
              else
                cd /app/alpha-generator && git fetch origin && git reset --hard origin/main
              fi
              # vm-setup.sh is idempotent — handles Docker install, deer-flow clone, Ollama, compose
              chmod +x /app/alpha-generator/deploy/vm-setup.sh
              bash /app/alpha-generator/deploy/vm-setup.sh
            '

      - name: Print VM URLs
        run: |
          VM_IP=$(gcloud compute instances describe alpha-vm \
            --zone asia-east1-c \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')
          echo "DeerFlow UI:  http://${VM_IP}/"
          echo "Dashboard:    http://${VM_IP}:8080/"
