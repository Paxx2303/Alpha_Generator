services:
  deerflow-agent:
    image: ghcr.io/bytedance/deer-flow:main
    container_name: deerflow-agent
    restart: unless-stopped
    ports:
      - "8010:8000"
    environment:
      DEBUG: "false"
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      DEERFLOW_MODEL_NAME: ${DEERFLOW_MODEL_NAME:-openrouter/owl-alpha}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/deerflow.legacy.conf.yaml:/app/conf.yaml:ro
      - ./knowledge_base:/app/knowledge_base
      - ./logs/deerflow:/app/logs
    working_dir: /app
    command:
      - /app/.venv/bin/python
      - server.py
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: wq-hermes-agent
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-dummy}
      HERMES_MODEL_NAME: ${HERMES_MODEL_NAME:-openrouter/owl-alpha}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/hermes.9router.runtime.yaml:/opt/data/config.yaml:ro
      - ./knowledge_base:/workspace/knowledge_base
      - ./skills:/workspace/skills
      - ./logs/hermes:/workspace/logs
    working_dir: /workspace
    entrypoint: []
    command:
      - sh
      - -lc
      - >
        mkdir -p /workspace/logs;
        python3 -c "import yaml, dotenv, httpx, requests, openai" >/dev/null 2>&1 ||
        (apt-get update &&
        apt-get install -y python3-yaml python3-dotenv python3-httpx python3-requests python3-openai);
        /opt/hermes/hermes --version > /workspace/logs/version.txt 2>&1 || true;
        tail -f /dev/null
