# DeerFlow config for Alpha Generator
# Place this file in /app/deer-flow/ (DeerFlow repo root) on the VM.
# vm-setup.sh and deploy.yml copy it there automatically.
#
# LLM: Qwen2.5:14b via Ollama running locally on the VM.
# Ollama serves an OpenAI-compatible API at http://localhost:11434/v1.
# No GPU needed — runs on CPU (e2-standard-4 / 16GB RAM).
# Model pull happens in vm-setup.sh during first deploy.

models:
  - name: qwen
    display_name: Qwen2.5:14b (Ollama local)
    use: langchain_openai:ChatOpenAI
    model: qwen2.5:14b
    api_key: ollama
    base_url: http://host.docker.internal:11434/v1
    max_tokens: 8192
    temperature: 0.7
    request_timeout: 600.0
    max_retries: 3

tools:
  web:
    - deerflow.community.ddg_search.tools:web_search_tool

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false
