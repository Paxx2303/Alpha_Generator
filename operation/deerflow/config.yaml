# DeerFlow config for Alpha Generator
# Place this file in operation/deerflow/vendor/ (DeerFlow repo root) before running.

models:
  - name: glm-5.2
    display_name: GLM-5.2 (vLLM)
    use: langchain_openai:ChatOpenAI
    model: zai-org/GLM-5.2
    api_key: $GLM_API_KEY
    base_url: $GLM_BASE_URL
    max_tokens: 8192
    temperature: 0.7
    request_timeout: 300.0
    max_retries: 2

tools:
  web:
    - deerflow.community.ddg_search.tools:web_search_tool

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false
