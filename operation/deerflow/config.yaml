# DeerFlow config for Alpha Generator
# LLM: OpenRouter (cloud API) — no GPU/RAM required on VM.
# Switch model by changing the `model` field below.
# Free models: google/gemini-2.0-flash-exp:free, meta-llama/llama-3.3-70b-instruct:free

models:
  - name: openrouter
    display_name: Gemini 2.0 Flash (OpenRouter)
    use: langchain_openai:ChatOpenAI
    model: google/gemini-2.0-flash-exp:free
    api_key: $OPENROUTER_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 8192
    temperature: 0.7
    request_timeout: 120.0
    max_retries: 3

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  allow_host_bash: false
